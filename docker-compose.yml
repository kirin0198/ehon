# Docker Compose: ローカル開発・テスト実行用
#
# 使い方:
#   docker compose up dev               # 開発サーバ起動 (http://localhost:5173)
#   docker compose run --rm test        # Vitest 単体テスト
#   docker compose run --rm typecheck   # tsc --noEmit
#   docker compose run --rm lint        # ESLint
#   docker compose run --rm build       # 本番ビルド (typecheck + vite build)
#   docker compose run --rm e2e         # Playwright E2E (dev サービスを依存起動)
#
# 初回のみ docker compose build で image を構築。
# node_modules はコンテナ内 named volume に隔離するためホスト OS を汚さない。

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  working_dir: /app
  volumes:
    - .:/app
    - app_node_modules:/app/node_modules
  init: true

services:
  dev:
    <<: *app-base
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - '5173:5173'
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true

  test:
    <<: *app-base
    command: npm test
    profiles: ['test']

  typecheck:
    <<: *app-base
    command: npm run typecheck
    profiles: ['test']

  lint:
    <<: *app-base
    command: npm run lint
    profiles: ['test']

  build:
    <<: *app-base
    command: npm run build
    profiles: ['test']

  # E2E は Playwright 公式イメージ (Chromium / WebKit 同梱) を利用。
  # dev サービスを起動し http://dev:5173 に対して実行する。
  e2e:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    working_dir: /app
    volumes:
      - .:/app
      - e2e_node_modules:/app/node_modules
    environment:
      - PLAYWRIGHT_BASE_URL=http://dev:5173
      - CI=1
    depends_on:
      dev:
        condition: service_started
    command: sh -c "npm ci && npx playwright test"
    init: true
    profiles: ['test']

volumes:
  app_node_modules:
  e2e_node_modules:
